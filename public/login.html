<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - StudyMate</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px 40px;
            width: 380px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0 0 4px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #8e8ea0;
            margin-bottom: 28px;
        }

        .login-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            border-color: #667eea;
        }

        .login-input.error {
            border-color: #e74c3c;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .login-btn:hover {
            opacity: 0.92;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">🎓</div>
        <h1 class="login-title">StudyMate</h1>
        <p class="login-subtitle">请输入密码以继续</p>

        <form id="loginForm" autocomplete="off">
            <input
                type="password"
                id="passwordInput"
                class="login-input"
                placeholder="输入密码"
                autofocus
            >
            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        </form>

        <div class="login-error" id="loginError"></div>
    </div>

    <script>
        var form = document.getElementById("loginForm");
        var input = document.getElementById("passwordInput");
        var btn = document.getElementById("loginBtn");
        var errEl = document.getElementById("loginError");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            var password = input.value.trim();
            if (!password) {
                input.classList.add("error");
                errEl.textContent = "请输入密码";
                setTimeout(function () { input.classList.remove("error"); }, 400);
                return;
            }

            btn.disabled = true;
            btn.textContent = "登录中...";
            errEl.textContent = "";

            try {
                var res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: password }),
                });

                var json = await res.json();

                if (json.success) {
                    // 登录成功，跳转到首页
                    window.location.href = "/";
                } else {
                    errEl.textContent = json.error || "登录失败";
                    input.classList.add("error");
                    setTimeout(function () { input.classList.remove("error"); }, 400);
                }
            } catch (err) {
                errEl.textContent = "网络错误，请重试";
            } finally {
                btn.disabled = false;
                btn.textContent = "登 录";
            }
        });
    </script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js", { scope: "/" })
                .then(function (reg) {
                    console.log("[SW] 注册成功, scope:", reg.scope);
                })
                .catch(function (err) {
                    console.error("[SW] 注册失败:", err);
                });
        }
    </script>
</body>
</html>
